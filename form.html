<!DOCTYPE html>
<html>
    <head>
        <title>FORM</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
        <style>
            *{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body{
    height: 100vh;
    background: url("tv.jpeg");
    background-size: cover;       /* image fits full screen */
    background-position: center;  /* image centered */
    background-repeat: no-repeat; /* no repeat */
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    font-family: sans-serif;
    font-weight: 400;
    color: #a8a3a3;
}


/* HOME button in top-right */
.top-home-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    padding: 12px 25px;
    background: black;
    color: white;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    font-size: 16px;
    font-weight: 600;
}

/* FORM container */
.container{
    width: 400px;
    height: 650px;
    background-color: #f9f9f9;
    border-radius: 30px;
    padding: 40px;
    text-align: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    font-size: 2%;
}

.container h1{
    margin-bottom: 40px;
    font-size: 30px;
    font-family: sans-serif;
    font-size: 46px;
}

.container form label{
    display: block;
    text-align: left;
    font-size: 12px;
    margin-bottom: -5px;
}

.container form input{
    width: 100%;
    border: none;
    border-bottom: 1px solid #000;
    padding: 10px 0;
    font-size: 17px;
    margin-bottom: 30px;
    background: transparent;
    outline: none;
}

.container form button{
    width: 100%;
    height: 50px;
    border-radius: 50px;
    background: linear-gradient(to right,#FF00D0,#05CDFF);
    border: none;
    font-size: 20px;
    font-weight: 800;
    color: white;
    cursor: pointer;
}
/* .container form button:hover{
     background: linear-gradient(to left,#FF00D0,#05CDFF) ;
     border-color: #05cdff;
    box-shadow: 0 0 25px rgba(5, 205, 255, 0.4);
} */


/* Social login container */
.social-circle {
    position: absolute;
    top: 72%;
    left: 50%;
    transform: translateX(-50%);
    
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
}

/* Text centered */
.social-circle p {
    font-size: 18px;
    color: #a8a3a3;
    font-weight: 300px;
    margin: 0;
}

/* Icons horizontal (your requirement) */
.social-icons {
    display: flex;
    flex-direction: row;
    justify-content: center;
    gap: 25px;
}

/* Circle button design */
.circle-btn {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: none;
    background: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    box-shadow: 0px 4px 12px rgba(0,0,0,0.15);
    transition: 0.3s ease;
}

.circle-btn:hover {
    transform: scale(1.1);
    background-color: #000;
}

/* Google icon size */
.google-circle img {
    width: 30px;
    height: 30px;
}

/* Facebook icon size */
.facebook-circle i {
    font-size: 28px;
    color: #1877F2;
}
        </style>
    </head>
    <body>

    <button class="top-home-btn" onclick="window.location.href='landingPage.html'">HOME</button>

    <div class="container">
        <h1>COME JOIN US!</h1>
        <form>
            <label>USERNAME</label>
            <input type="text">

            <label>PASSWORD</label>
            <input type="password">

            <button>Login</button>
        </form>
        
    </div>
    <div class="social-circle">
    <p>or login with</p>

    <div class="social-icons">
        <button class="circle-btn google-circle" onclick="window.location.href='https://www.google.com/'">
            <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" alt="Google" >
        </button>

        <button class="circle-btn facebook-circle" onclick="window.location.href='https://www.facebook.com/'">
            <i class="fa-brands fa-facebook-f"></i>
        </button>
    </div>
</div>

</body>
</html>
